<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Default tab title before React mounts; frontend.tsx then refines it to
		     "CodingHarness — <page>" per route. -->
		<title>CodingHarness</title>
		<link rel="stylesheet" href="./index.css" />
		<!-- studio-theming: resolve + apply the theme before first paint so the
		     page never flashes the wrong palette. Mirrors frontend.tsx's logic. -->
		<script>
			(() => {
				try {
					const t = localStorage.getItem("studio-theme") || "system";
					const dark =
						t === "dark" ||
						(t === "system" &&
							matchMedia("(prefers-color-scheme: dark)").matches);
					document.documentElement.classList.toggle("dark", dark);
				} catch (_) {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="./frontend.tsx"></script>
	</body>
</html>
