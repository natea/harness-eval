# Frozen test plan for the `rest-api` target (Apex Logistics Quote & ROI API).
# Adapted from the ViBench `logistics` test plans, re-authored as HTTP-observable
# checks (no browser). ViBench semantics: sequential, weighted, fatal gates halt.
# Evidence = requests issued (curl) + observed status codes / JSON bodies.
#
# Worked ROI example used by R-1 (all derived by hand from PRD §2):
#   inputs: annualPallets 100, portSplitEastPct 100, palletsPerContainer 20,
#           storageMonths 0, handling 0, riskBufferPct 0, ftzSavingsPct 0,
#           drayCostSE 420, drayCostNE 380, storageRateSE 9, storageRateNE 11,
#           destinations [{name "DC1", region "SE", costPerPallet 10}]
#   => containers 5, share 100
#   scenarioA.total = (5*420 + 0 + 0 + 10*100)          = 3100  costPerPallet 31
#   scenarioB.total = (5*380*1.3 + 0 + 0 + 10*1.5*100)  = 3970  costPerPallet 39.7  roi -28.0645…
#   scenarioC.total = (5*420 + 0 + 0 + 10*100)          = 3100  costPerPallet 31    roi 0
version: "1.0.0"
prdSha256: 654717002fddf27d876c577a53b5adf75f9d4ae01c4262c9021c9bd05c3d74c1

steps:
  - id: S-1
    covers: ["6.R1"]
    description: setup.sh installs deps and start.sh boots the service on $PORT
    check: >
      Run ./setup.sh in a clean copy (exit 0). Then PORT=3000 ./start.sh & ;
      poll http://localhost:3000/ or any documented health path until the
      server answers within 30s. Fatal: if the service never serves, the API
      cannot be evaluated.
    weight: 4
    fatal: true

  - id: ROI-1
    covers: ["2", "6.R4", "6.R5"]
    description: ROI scenarios match the worked example exactly
    check: >
      POST /api/roi with the worked-example body above. Assert HTTP 200 and
      scenarioA.total == 3100, scenarioB.total == 3970, scenarioC.total == 3100
      (±0.01); scenarioA.costPerPallet == 31, scenarioB.costPerPallet == 39.7,
      scenarioC.costPerPallet == 31; scenarioB.roi ≈ -28.0645 and
      scenarioC.roi == 0 (±0.01).
    weight: 6

  - id: ROI-2
    covers: ["2", "6.R4"]
    description: ROI defaults and multi-destination hybrid math hold
    check: >
      POST /api/roi using the PRD default rates with annualPallets 1000,
      portSplitEastPct 60, storageMonths 1.5, and two destinations
      [{"DC1","SE",22},{"DC9 - Mobile","NE",48}]. Recompute scenarioA/B/C per
      the §2 formulas and assert the three totals match the response (±0.01) and
      that roiB/roiC equal (totalA−totalX)/totalA×100.
    weight: 4

  - id: ROI-3
    covers: ["2", "6.R6"]
    description: ROI input validation
    check: >
      POST /api/roi with annualPallets 0 → 400; with portSplitEastPct 150 → 400;
      with a destination region "XX" → 400; with 0 destinations → 400 and with
      11 destinations → 400. Each error body has an `error` field.
    weight: 3

  - id: INS-1
    covers: ["1", "6.R2"]
    description: insights list ordering and excerpt rule
    check: >
      GET /api/insights → 200 array of 3 items ordered newest-first
      (ftz-vs-bonded-warehouse, cross-dock-near-port, how-to-choose-a-3pl).
      Each excerpt is ≤ 51 chars; verify against one known body that a mid-word
      cut at char 50 includes the partial word and ends with "…".
    weight: 3

  - id: INS-2
    covers: ["1", "6.R3"]
    description: insight detail and unknown-slug 404
    check: >
      GET /api/insights/cross-dock-near-port → 200 with title + full body;
      GET /api/insights/does-not-exist → 404.
    weight: 2

  - id: CON-1
    covers: ["3", "6.R7"]
    description: contact validation + exact success message
    check: >
      POST /api/contact valid (name, valid email, inquiryType "Service Question",
      message ≥ 10 chars) → 201 with message exactly
      "Message sent successfully! We'll respond within 24 hours.".
      POST with message "too short" (<10) → 400; with inquiryType "Nope" → 400;
      with phone "12345" → 400.
    weight: 3

  - id: QUO-1
    covers: ["4", "6.R8"]
    description: quote validation incl. conditional phone + exact success message
    check: >
      POST /api/quote valid (contactMethod "Email", company non-empty,
      ≥1 serviceInterests, valid industry/timeline, estimatedVolume ≥ 0) → 201
      with message exactly
      "Request sent successfully! We'll respond within 4 business hours." and an
      `id`. POST with contactMethod "Phone" and no phone → 400. POST with empty
      serviceInterests → 400.
    weight: 4

  - id: QUO-2
    covers: ["4", "5", "6.R9", "6.R10"]
    description: quote persists and surfaces in authed admin, newest first
    check: >
      Submit two valid quotes (Q1 then Q2). GET /api/admin/quotes without the
      header → 401; with X-Admin-Password "wrong" → 401; with
      X-Admin-Password "apex-logistics-3421" → 200 array containing both, Q2
      before Q1 (newest first), each with id + createdAt + submitted fields.
    weight: 5
