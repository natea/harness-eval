  originalDir: prds/pilot_logbook
  license: Apache-2.0
  note: >
    Adapted from the ViBench `pilot_logbook` browser-driven PRD into an HTTP/JSON
    API target focused on aircraft management, the flight validation matrix, and
    range-scoped analytics; currency/export/future-date concerns out of scope.
coldStartContract:
  - "`setup.sh` — installs all dependencies for your implementation."
  - "`start.sh` — launches the logbook service on the port given by `$PORT` (default 3000)."
deliverableNotes: >
  Section 5 is the Definition of Done; Section 6 lists non-goals (no currency,
  no future-date rule, no CSV export). All dates are UTC ISO `YYYY-MM-DD`. Times
  are decimal hours in 0.1 increments. Registration uniqueness is canonical
  (uppercase, spaces/hyphens removed) but the original formatting is preserved.
  In-process persistence is acceptable.
