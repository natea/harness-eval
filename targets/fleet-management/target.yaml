  repo: https://github.com/ViBench/vibench-public
  commit: 5baa6892bad7dcf6ec0bee4f44e4e46445271f19
  originalDir: prds/fleet_management
  license: Apache-2.0
  note: >
    Adapted from the ViBench `fleet_management` (FleetCare) browser PRD into an
    API-only service: vehicles/tasks CRUD and the distance-based status engine
    reframed as JSON endpoints. UI/DOM, offline/localStorage persistence, and the
    delete-confirmation handshake were dropped; the status, ordering, and
    aggregation rules are preserved verbatim.
