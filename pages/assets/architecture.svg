<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" font-family="ui-sans-serif, system-ui" font-size="13">
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#8b949e" stroke-width="1.6"/>
</marker>
<style>
.box { rx: 8; stroke-width: 1.5; }
.t { fill: #e6edf3; } .h { font-weight: 600; }
.s { fill: #9aa4b2; font-size: 11.5px; }
.e { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#ar); }
</style>
</defs>
<rect width="1000" height="880" fill="#0d1117"/>

<!-- inputs -->
<rect class="box" x="40" y="40" width="250" height="80" fill="#1c2e4a" stroke="#58a6ff"/>
<text class="t h" x="165" y="68" text-anchor="middle">Candidate registry</text>
<text class="s" x="165" y="86" text-anchor="middle">superpowers · compound-eng</text>
<text class="s" x="165" y="101" text-anchor="middle">agent-skills · gsd (pinned)</text>

<rect class="box" x="330" y="40" width="270" height="80" fill="#1c2e4a" stroke="#58a6ff"/>
<text class="t h" x="465" y="68" text-anchor="middle">Eval targets</text>
<text class="s" x="465" y="86" text-anchor="middle">PRD + frozen test plan + fixtures</text>
<text class="s" x="465" y="101" text-anchor="middle">(symphony-daemon · cli-tool · BYO)</text>

<rect class="box" x="640" y="40" width="200" height="80" fill="#1c2e4a" stroke="#58a6ff"/>
<text class="t h" x="740" y="72" text-anchor="middle">Run config</text>
<text class="s" x="740" y="92" text-anchor="middle">budgets · weights · model</text>

<!-- orchestrator -->
<rect class="box" x="280" y="180" width="320" height="80" fill="#2d1b4e" stroke="#bc8cff"/>
<text class="t h" x="440" y="210" text-anchor="middle">Orchestrator</text>
<text class="s" x="440" y="230" text-anchor="middle">matrix scheduler · budget caps · infra-retry · provenance</text>

<!-- providers -->
<rect class="box" x="120" y="320" width="640" height="100" fill="#0f3a2e" stroke="#3fb950"/>
<text class="t h" x="440" y="348" text-anchor="middle">SandboxProvider — preflight · shared pinned trial image</text>
<text class="t" x="440" y="372" text-anchor="middle">Daytona ☁ · E2B ☁ · Docker · macOS-VZ  · worktree</text>
<text class="s" x="440" y="396" text-anchor="middle">stale-sandbox sweep · per-trial isolation (contamination-tested)</text>

<!-- build -->
<rect class="box" x="280" y="460" width="320" height="80" fill="#4a2800" stroke="#f0883e"/>
<text class="t h" x="440" y="490" text-anchor="middle">Headless Claude Code build sessions</text>
<text class="s" x="440" y="512" text-anchor="middle">Max-plan OAuth → archive + secret redaction</text>

<!-- grading -->
<rect class="box" x="80" y="600" width="340" height="90" fill="#3a0f24" stroke="#ff7b9d"/>
<text class="t h" x="250" y="628" text-anchor="middle">Evaluator agent (no-repair)</text>
<text class="s" x="250" y="648" text-anchor="middle">frozen test plan vs the RUNNING artifact</text>
<text class="s" x="250" y="666" text-anchor="middle">mock fixtures · evidence per step · checkpointed</text>

<rect class="box" x="460" y="600" width="340" height="90" fill="#3a0f24" stroke="#ff7b9d"/>
<text class="t h" x="630" y="628" text-anchor="middle">Blind code-quality judge</text>
<text class="s" x="630" y="648" text-anchor="middle">5 criteria × 3 samples (median) · judge ≠ worker</text>
<text class="s" x="630" y="666" text-anchor="middle">scrubbed workspace copy</text>

<!-- outputs -->
<rect class="box" x="280" y="740" width="320" height="80" fill="#1c2e4a" stroke="#58a6ff"/>
<text class="t h" x="440" y="770" text-anchor="middle">results.json + scorecard.md</text>
<text class="s" x="440" y="792" text-anchor="middle">weighted composite (re-weightable) · variance · flags</text>

<rect class="box" x="650" y="740" width="300" height="80" fill="#0f3a2e" stroke="#3fb950"/>
<text class="t h" x="800" y="770" text-anchor="middle">Dashboard (localhost)</text>
<text class="s" x="800" y="792" text-anchor="middle">+ static demo → codingharness.xyz</text>

